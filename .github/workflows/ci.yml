# .github/workflows/ci.yml
#
# What is this file?
# This is the CI (Continuous Integration) pipeline for Crate.
#
# What is CI?
# CI is the practice of automatically running tests and checks every time
# code is pushed. It catches problems before they reach the main branch —
# a broken test, a linting error, a type error — without you having to
# remember to run these checks manually.
#
# This pipeline runs three jobs:
#   lint     — checks code style and types (fast, runs in parallel with frontend)
#   test     — runs pytest with coverage (runs after lint passes)
#   frontend — checks and builds the React app (runs in parallel with lint)
#
# How to see results:
#   Push to GitHub, then go to the "Actions" tab in your repository.
#   Each workflow run shows green (pass) or red (fail) for each job.
#   Click a failed job to see which step failed and why.

name: CI

on:
  push:
    branches: ["**"]      # run on every push to any branch
  pull_request:
    branches: [main]      # run on every PR targeting main

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: lint
  # Checks Python code style (ruff), formatting (ruff format), and types (pyright).
  # Runs in parallel with the frontend job.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        # This downloads your repository code onto the CI machine.

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
        # uv is the package manager. This action installs it on the CI machine.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: uv sync --extra dev
        # Installs all [project.optional-dependencies.dev] packages.
        # Does NOT install the 'analysis' group (no Essentia in CI).

      - name: Run ruff lint
        run: uv run ruff check .
        # Checks for style violations, undefined names, unused imports, etc.

      - name: Run ruff format check
        run: uv run ruff format --check .
        # Checks that all files are formatted consistently.
        # Use 'uv run ruff format .' locally to fix formatting issues.

      - name: Run pyright type check
        run: uv run pyright
        # Checks type annotations. Won't fail on unannotated code (basic mode).

  # ---------------------------------------------------------------------------
  # Job 2: test
  # Runs pytest with coverage. Only runs after lint passes (needs: lint).
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    # 'needs: lint' means this job only starts if the lint job succeeded.
    # This avoids wasting time running tests when the code has style errors.

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: uv sync --extra dev
        # Installs dev + runtime dependencies.
        # Deliberately excludes '--extra analysis' — Essentia is excluded from CI.
        # Why? Essentia requires native libraries and takes 10+ minutes to install.
        # The import pipeline tests that need Essentia are skipped in CI.

      - name: Run pytest with coverage
        run: uv run pytest --cov=backend --cov-report=xml --cov-fail-under=60
        # --cov=backend          measure coverage for the backend/ package
        # --cov-report=xml       write coverage.xml (uploaded as artifact below)
        # --cov-fail-under=60    fail the job if coverage drops below 60%
        #
        # What is a coverage threshold?
        # If coverage drops below 60%, the CI job fails. This prevents the
        # codebase from growing without corresponding tests. 60% is a floor,
        # not a goal — raise it as the project matures.

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
        # Makes the coverage.xml file downloadable from the CI run.
        # 'if: always()' uploads even if the tests failed, so you can see
        # what coverage was before the failure.

  # ---------------------------------------------------------------------------
  # Job 3: frontend
  # Checks and builds the React app. Runs in parallel with lint.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dir: frontend/node_modules
        # Node 20 is the current LTS (Long-Term Support) version.
        # 'cache: npm' caches node_modules between runs to speed up installs.

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Run ESLint
        run: npm run lint
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        # 'npm run build' runs Vite's production build.
        # If this step passes, the frontend compiles without errors.
        # A build failure here would mean the user can't run the app at all.
